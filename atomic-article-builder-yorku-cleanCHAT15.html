<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halo Forge: Create &amp; Publish Halo Knowledge Articles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{
      --york-red-dark:#810001;
      --york-red:#E31837;
      --rose-tint:#F2526B;
      --warm-blush:#F99A9F;
      --york-grey-dark:#686260;
      --york-grey-medium:#8E857F;
      --stone-grey:#6F6862;
      --sky-bridge-blue:#75CFEF;
      --york-bright-blue:#3AC2EF;
      --ice-blue:#198DBF;
      --lassonde-navy:#003366;
      --midnight-steel:#1A1F2B;
      --york-black:#000000;
      --app-bg:#f4f2f1;
      --line:#ddd7d4;
      --muted:#686260;
      --soft-red:#fff0f2;
    }
    html,body{height:100%;background:var(--app-bg);color:#20242a;}
    body{overflow:hidden;font-size:.94rem;}
    .topbar{height:52px;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(26,31,43,.04);}
    
    .shell{height:calc(100vh - 52px);}
    .sidebar{width:304px;background:linear-gradient(180deg,var(--midnight-steel),#11151f);border-right:1px solid rgba(255,255,255,.08);overflow:auto;color:#fff;}
    .workspace{height:calc(100vh - 52px);overflow:auto;position:relative;background:radial-gradient(circle at 92% 4%,rgba(227,24,55,.14),transparent 26rem),radial-gradient(circle at 98% 76%,rgba(117,207,239,.20),transparent 24rem),linear-gradient(135deg,#f7f5f4 0%,#f1eeee 48%,#f7fbfc 100%);}
    .work-inner{max-width:1180px;margin:0 auto;position:relative;z-index:1;}
    .york-btn{background:var(--york-red);border-color:var(--york-red);color:#fff;font-weight:600;}
    .york-btn:hover,.york-btn:focus{background:var(--york-red-dark);border-color:var(--york-red-dark);color:#fff;}
    .btn-outline-york{border-color:var(--york-red);color:var(--york-red);}
    .btn-outline-york:hover{background:var(--york-red);color:#fff;}
    .small-label{font-size:.76rem;font-weight:800;letter-spacing:.04em;color:#5d6876;text-transform:uppercase;}
    .muted-help{font-size:.82rem;color:var(--muted);}
    .batch-card{border:1px solid rgba(255,255,255,.12);border-radius:.85rem;background:rgba(255,255,255,.95);margin-bottom:.6rem;padding:.75rem;cursor:pointer;color:#20242a;}
    .batch-card.active{border-color:var(--york-red);box-shadow:0 0 0 3px rgba(227,24,55,.18);}
    .batch-card:hover{border-color:#c9d1db;}
    .min-w-0{min-width:0;}
    .batch-menu-btn{opacity:.55;padding:.15rem .3rem;line-height:1;}
    .batch-card:hover .batch-menu-btn,.batch-card.active .batch-menu-btn,.batch-menu-btn:focus{opacity:1;}
    .batch-card .dropdown-menu{font-size:.9rem;}
    .card{border-color:#e1ddd9;border-radius:.95rem;box-shadow:0 10px 24px rgba(26,31,43,.06);}
    .card-header{background:#fff;border-bottom-color:#ebe5e2;border-radius:.95rem .95rem 0 0!important;}
    .flow{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;}
    .flow-step{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:1rem;padding:.85rem .95rem;display:flex;gap:.75rem;align-items:center;min-height:74px;box-shadow:0 10px 24px rgba(26,31,43,.05);}
    .flow-step .num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f1eeed;color:var(--midnight-steel);font-weight:800;flex:0 0 auto;}
    .flow-step.active{border-color:var(--york-red);box-shadow:0 0 0 3px rgba(227,24,55,.12);}
    .flow-step.active .num{background:var(--york-red);color:#fff;}
    .flow-step.done .num{background:var(--york-red-dark);color:#fff;}
    .source-drop{border:2px dashed #c7cdd6;background:#fafbfc;border-radius:.85rem;min-height:118px;display:flex;align-items:center;justify-content:center;text-align:center;}
    .source-row{cursor:pointer;}
    .source-row:hover{background:#f8fafc;}
    .source-row.active:hover{background:var(--york-red-dark);}
    .source-drop.drag{border-color:var(--york-red);background:var(--soft-red);}
    .article-row{border:1px solid #e1e5eb;border-radius:.85rem;background:#fff;padding:.8rem;cursor:pointer;overflow:hidden;}
    .article-row.active{border-color:var(--york-red);box-shadow:0 0 0 3px rgba(227,24,55,.08);}
    .status-draft{background:#f1eeed;color:var(--stone-grey);}
    .status-published{background:var(--midnight-steel);color:#fff;}
    .status-ready{background:var(--york-red-dark);color:#fff;}
    .article-row .article-title-wrap{min-width:0;flex:1 1 auto;padding-right:.5rem;}
    .article-row .article-status-wrap{flex:0 0 auto;max-width:none;}
    .article-row .badge{max-width:none;white-space:nowrap;text-align:center;overflow:visible;}
    .halo-form{background:#fff;border:1px solid #e1ddd9;border-radius:.95rem;padding:1.25rem;box-shadow:0 10px 24px rgba(26,31,43,.06);}
    .halo-form .form-control,.halo-form .form-select{border-radius:.2rem;border-color:#cfd4db;}
    .required::after{content:' *';color:var(--york-red);font-weight:700;}
    .toolbar{border:1px solid #d6dbe2;border-bottom:0;border-radius:.55rem .55rem 0 0;background:#fff;padding:.45rem;display:flex;gap:.25rem;align-items:center;flex-wrap:wrap;}
    .toolbar .btn{border:0;color:#30343b;background:transparent;padding:.25rem .45rem;}
    .toolbar .btn:hover,.toolbar .btn:focus{background:#eef1f5;}
    .richbox{border:1px solid #d6dbe2;border-radius:0 0 .55rem .55rem;min-height:132px;padding:1rem;background:#fff;outline:none;line-height:1.5;}
    .richbox:focus{border-color:var(--york-red);box-shadow:0 0 0 .22rem rgba(227,24,55,.14);}
    .richbox[contenteditable="false"], .locked-field{background:#f8f9fa;color:#495057;}
    .toolbar.locked{background:#f8f9fa;}
    .richbox:empty:before{content:attr(data-placeholder);color:#8b93a1;}
    .tag-chip{display:inline-flex;align-items:center;gap:.35rem;background:#f1f3f6;border:1px solid #d9dee6;border-radius:999px;padding:.25rem .55rem;margin:.15rem;font-size:.84rem;}
    .tag-chip button{border:0;background:transparent;padding:0;color:#667085;}
    .focus-ring:focus,.btn:focus,.form-control:focus,.form-select:focus,.form-check-input:focus{box-shadow:0 0 0 .22rem rgba(227,24,55,.18)!important;border-color:var(--york-red)!important;}
    .divider-text{display:flex;align-items:center;gap:.7rem;color:#697384;font-size:.8rem;font-weight:800;text-transform:uppercase;}
    .divider-text::before,.divider-text::after{content:'';height:1px;background:#e3e7ed;flex:1;}
    .sticky-editor-actions{position:sticky;bottom:0;background:#fff;border-top:1px solid #e7ebef;padding:.75rem;margin:1rem -1.25rem -1.25rem;z-index:2;}

    .forge-logo{width:30px;height:30px;border-radius:.65rem;background:var(--midnight-steel);display:inline-flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);flex:0 0 auto;}
    .forge-logo svg{width:23px;height:23px;}
    .forge-logo-base{fill:#fff;}
    .forge-logo-accent{fill:var(--rose-tint);}
    .yu-logo{height:30px;width:auto;object-fit:contain;}
    .sidebar .small-label{color:#f7f5f4;}
    .sidebar .form-control{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.16);color:#fff;}
    .sidebar .form-control::placeholder{color:rgba(255,255,255,.62);}
    .sidebar .form-control:focus{background:rgba(255,255,255,.12);color:#fff;border-color:var(--warm-blush)!important;}
    .sidebar .text-muted{color:#d6cfcb!important;}
    .sidebar .batch-card .text-muted{color:#5f6873!important;}
    .sidebar .batch-menu-btn{color:#4e5661;}
    .workspace::before{content:'';position:fixed;right:2rem;top:6rem;width:18rem;height:18rem;background:linear-gradient(135deg,rgba(227,24,55,.10),rgba(117,207,239,.13));clip-path:polygon(0 0,100% 20%,85% 100%,15% 88%);pointer-events:none;z-index:0;}
    .workspace::after{content:'';position:fixed;right:0;bottom:0;width:26rem;height:7rem;background:linear-gradient(90deg,transparent,rgba(129,0,1,.09));pointer-events:none;z-index:0;}
    .badge-york-ready{background:var(--york-red-dark);color:#fff;}
    .badge-york-progress{background:var(--stone-grey);color:#fff;}
    .badge-york-partial{background:var(--ice-blue);color:#fff;}
    .badge-york-published{background:var(--midnight-steel);color:#fff;}
    .badge-york-draft{background:#f1eeed;color:var(--stone-grey);}
    .text-bg-success{background-color:var(--york-red-dark)!important;color:#fff!important;}
    .text-bg-primary{background-color:var(--ice-blue)!important;color:#fff!important;}
    .text-bg-secondary{background-color:var(--stone-grey)!important;color:#fff!important;}
    .text-bg-dark{background-color:var(--midnight-steel)!important;color:#fff!important;}
    .list-group-item.active{background-color:var(--york-red-dark)!important;border-color:var(--york-red-dark)!important;color:#fff;}
    .list-group-item.active .badge.text-bg-light{background-color:#fff!important;color:var(--midnight-steel)!important;}
    .btn-outline-danger{border-color:var(--rose-tint);color:var(--york-red-dark);}
    .btn-outline-danger:hover{background:var(--york-red-dark);border-color:var(--york-red-dark);color:#fff;}
    .btn-danger{background:var(--york-red);border-color:var(--york-red);}
    .btn-danger:hover{background:var(--york-red-dark);border-color:var(--york-red-dark);}
    .source-drop{background:linear-gradient(135deg,#fff,#fff7f8);}
    #batchStatus{box-shadow:0 8px 18px rgba(26,31,43,.12);}


    /* Refinement: reduce red in interaction states. Red remains for York branding and destructive/primary actions only. */
    :root{
      --selected-navy:#003366;
      --selected-navy-soft:rgba(0,51,102,.14);
      --status-success:#198754;
      --status-info:#0d6efd;
      --status-neutral:#6c757d;
    }

    /* Selected UI states use navy, not red. */
    .batch-card.active{
      border-color:var(--selected-navy)!important;
      box-shadow:0 0 0 3px var(--selected-navy-soft)!important;
    }
    .flow-step.active{
      border-color:var(--selected-navy)!important;
      box-shadow:0 0 0 3px var(--selected-navy-soft)!important;
    }
    .flow-step.active .num,
    .list-group-item.active,
    .source-row.active:hover{
      background-color:var(--selected-navy)!important;
      border-color:var(--selected-navy)!important;
      color:#fff!important;
    }
    .article-row.active{
      border-color:var(--selected-navy)!important;
      box-shadow:0 0 0 3px var(--selected-navy-soft)!important;
    }
    .richbox:focus{
      border-color:var(--selected-navy)!important;
      box-shadow:0 0 0 .22rem var(--selected-navy-soft)!important;
    }
    .focus-ring:focus,
    .btn:focus,
    .form-control:focus,
    .form-select:focus,
    .form-check-input:focus{
      box-shadow:0 0 0 .22rem var(--selected-navy-soft)!important;
      border-color:var(--selected-navy)!important;
    }

    /* Workflow completed markers use a standard success colour. */
    .flow-step.done .num{
      background:var(--status-success)!important;
      color:#fff!important;
    }

    /* Status badges use conventional status colours for faster scanning. */
    .status-draft,
    .badge-york-draft{
      background:#e9ecef!important;
      color:#495057!important;
    }
    .status-ready,
    .badge-york-ready{
      background:var(--status-success)!important;
      color:#fff!important;
    }
    .status-published,
    .badge-york-published{
      background:#212529!important;
      color:#fff!important;
    }
    .badge-york-progress{
      background:var(--status-neutral)!important;
      color:#fff!important;
    }
    .badge-york-partial{
      background:var(--status-info)!important;
      color:#fff!important;
    }

    /* Restore Bootstrap-like meaning for generic contextual badges. */
    .text-bg-success{
      background-color:var(--status-success)!important;
      color:#fff!important;
    }
    .text-bg-primary{
      background-color:var(--status-info)!important;
      color:#fff!important;
    }
    .text-bg-secondary{
      background-color:var(--status-neutral)!important;
      color:#fff!important;
    }
    .text-bg-dark{
      background-color:#212529!important;
      color:#fff!important;
    }

    /* Use navy for secondary/selection-style actions. */
    .btn-outline-york{
      border-color:var(--selected-navy)!important;
      color:var(--selected-navy)!important;
    }
    .btn-outline-york:hover{
      background:var(--selected-navy)!important;
      border-color:var(--selected-navy)!important;
      color:#fff!important;
    }
    .sidebar .form-control:focus{
      border-color:var(--sky-bridge-blue)!important;
      box-shadow:0 0 0 .22rem rgba(117,207,239,.22)!important;
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const KEY = 'haloForgeCreatePublishHaloKnowledgeArticlesV2';
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
    const uid = prefix => prefix + '_' + Math.random().toString(36).slice(2,9);
    const nowLabel = () => new Date().toLocaleString([], {year:'numeric', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
    const strip = html => (html || '').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').trim();
    const esc = s => (s??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    function articleTemplate(data={}){
      return {
        id:data.id || uid('art'),
        selected:data.selected ?? false,
        title:data.title || 'Untitled article',
        articleType:data.articleType || 'Knowledge Base Article',
        editor:data.editor || 'Rich',
        description:data.description || '',
        resolution:data.resolution || '',
        internalMemo:data.internalMemo || '',
        attachments:data.attachments || [],
        tags:data.tags || [],
        relatedArticles:data.relatedArticles || [],
        teams:data.teams || 'Any Team',
        faqLists:data.faqLists || [],
        active:data.active ?? true,
        nextReview:data.nextReview || '2026-07-15',
        allowedCustomers:data.allowedCustomers || ['YU ALL'],
        confidence:data.confidence || 84,
        published:data.published || data.status === 'published' || false,
        status:data.status || (data.published ? 'published' : 'draft')
      };
    }

    function mock(){
      return {
        selectedId:'b1',
        selectedSourceId:'s1',
        selectedArticleId:'a1',
        activeStep:'upload',
        batches:[
          {
            id:'b1', title:'Duo enrolment article batch', created:'2026-04-14 9:20 AM', updated:nowLabel(),
            sources:[
              {id:'s1', name:'Duo rollout support notes.docx', type:'DOCX placeholder', content:'Placeholder preview: Word extraction is not implemented in this prototype. This source contains support notes for Duo enrolment, bypass codes, common errors, and escalation paths.'},
              {id:'s2', name:'helpdesk-duo-cases.txt', type:'TXT', content:'Users report being stuck at the Duo prompt. Agents confirm whether the user has enrolled a device, whether the phone number is current, and whether a bypass code is needed.'},
              {id:'s3', name:'SME pasted notes', type:'Pasted text', content:'Include a separate article for getting a bypass code. Do not expose internal escalation notes in the public resolution.'}
            ],
            articles:[
              articleTemplate({id:'a1', selected:true, title:'Enroll a device in Duo', description:'<p>Use this article when a user needs to enroll a phone or authenticator app for Duo multi-factor authentication.</p>', resolution:'<ol><li>Go to the Duo enrolment page.</li><li>Sign in with Passport York.</li><li>Follow the prompts to add your device.</li><li>Complete a test authentication prompt.</li></ol>', internalMemo:'<p>Escalate to the IAM team if the enrolment page does not load after confirming browser and account status.</p>', tags:['Duo','MFA','Passport York'], relatedArticles:['Change your Duo device'], faqLists:['Duo Support'], allowedCustomers:['YU ALL'], confidence:92}),
              articleTemplate({id:'a2', title:'Request a Duo bypass code', description:'<p>Use this article when a user cannot complete Duo authentication and needs temporary access.</p>', resolution:'<p>Confirm the user identity using the approved verification process, then issue or escalate the bypass code request according to the current support procedure.</p>', internalMemo:'<p>Internal verification wording should be confirmed by the service owner before this is used broadly.</p>', tags:['Duo','Bypass code'], relatedArticles:['Enroll a device in Duo'], teams:'Any Team', faqLists:['Duo Support'], active:true, allowedCustomers:['YU STAFF','YU FAC'], confidence:78}),
              articleTemplate({id:'a3', title:'Troubleshoot Duo device changes', description:'<p>Use this article when a user has a new phone, changed phone number, or lost access to their previous Duo device.</p>', resolution:'<ul><li>Confirm whether another enrolled device is available.</li><li>If available, sign in and add the new device.</li><li>If unavailable, follow the bypass or identity verification process.</li></ul>', tags:['Duo','Device change'], relatedArticles:['Request a Duo bypass code'], faqLists:['Duo Support'], confidence:84})
            ]
          },
          {id:'b2', title:'VPN client install refresh', created:'2026-04-10 11:05 AM', updated:'2026-04-12 3:47 PM', sources:[{id:'s4', name:'vpn-install-notes.txt', type:'TXT', content:'Install VPN client. Common issues include expired password, unsupported OS, and missing admin rights.'}], articles:[]},
          {id:'b3', title:'Microsoft 365 storage cleanup', created:'2026-03-29 2:10 PM', updated:'2026-04-02 10:15 AM', sources:[{id:'s5', name:'storage-cleanup.doc', type:'DOC placeholder', content:'Placeholder preview: Word extraction is not implemented. Notes cover mailbox storage, OneDrive cleanup, and retention cautions.'}], articles:[articleTemplate({id:'a4', title:'Reduce Microsoft 365 storage usage', description:'<p>Use this article when a user needs to reduce Microsoft 365 storage usage.</p>', resolution:'<p>Delete unneeded files, empty deleted items, and review large files in OneDrive and Outlook.</p>', tags:['Microsoft 365','Storage'], faqLists:['Microsoft 365'], confidence:90, published:true})]}
        ]
      };
    }

    let state = load();
    let dirty = false;
    let saveTimer = null;

    function load(){
      try{
        const stored = JSON.parse(localStorage.getItem(KEY));
        return stored?.batches ? stored : mock();
      }catch(e){ return mock(); }
    }
    function persist(){ localStorage.setItem(KEY, JSON.stringify(state)); dirty=false; }
    function markDirty(){ dirty=true; const b=currentBatch(); if(b) b.updated=nowLabel(); clearTimeout(saveTimer); saveTimer=setTimeout(()=>{persist(); renderSidebar();},350); }
    function currentBatch(){ return state.batches.find(b=>b.id===state.selectedId) || state.batches[0]; }
    function currentArticle(){ const b=currentBatch(); return b?.articles.find(a=>a.id===state.selectedArticleId) || b?.articles[0]; }
    function currentSource(){ const b=currentBatch(); return b?.sources.find(s=>s.id===state.selectedSourceId) || b?.sources[0]; }
    function batchStatus(b){
      if(!b.articles.length) return {label:'In progress', cls:'badge-york-progress'};
      const published=b.articles.filter(a=>a.published).length;
      if(published===b.articles.length) return {label:'Published', cls:'badge-york-published'};
      if(published>0) return {label:'Partially published', cls:'badge-york-partial'};
      const ready=b.articles.filter(a=>a.status==='ready').length;
      if(ready>0) return {label:'Ready to publish', cls:'badge-york-ready'};
      return {label:'Ready to edit', cls:'badge-york-ready'};
    }

    function toast(msg){ $('#toastBody').textContent=msg; bootstrap.Toast.getOrCreateInstance($('#appToast')).show(); }

    function renderAll(){ renderHeader(); renderFlow(); renderSidebar(); renderViews(); }
    function renderHeader(){
      const b=currentBatch(); if(!b) return;
      $('#batchTitle').value=b.title;
      $('#batchMeta').textContent=`${b.sources.length} source item${b.sources.length===1?'':'s'} · ${b.articles.length} article draft${b.articles.length===1?'':'s'} · Updated ${b.updated}`;
      const s=batchStatus(b); $('#batchStatus').className=`badge fs-6 ${s.cls}`; $('#batchStatus').textContent=s.label;
    }
    function renderFlow(){
      const b=currentBatch(); if(!b) return;
      const published=b.articles.filter(a=>a.published).length;
      const ready=b.articles.filter(a=>!a.published && a.status==='ready').length;
      const drafts=b.articles.filter(a=>!a.published && a.status!=='ready').length;
      $('#uploadStepText').textContent=b.sources.length ? `${b.sources.length} source item${b.sources.length===1?'':'s'}` : 'No sources';
      $('#generateStepText').textContent=b.articles.length ? `${b.articles.length} generated` : 'No articles yet';
      $('#editStepText').textContent=b.articles.length ? `${drafts} draft${drafts===1?'':'s'} · ${ready} ready` : 'Generate first';
      $('#publishStepText').textContent=b.articles.length ? `${published}/${b.articles.length} published` : 'No articles yet';
      $$('.flow-step').forEach(btn=>{
        const step=btn.dataset.step;
        btn.classList.toggle('active', state.activeStep===step);
        btn.classList.remove('done');
        if(step==='upload' && b.sources.length) btn.classList.add('done');
        if(step==='generate' && b.articles.length) btn.classList.add('done');
        if(step==='edit' && b.articles.length) btn.classList.add('done');
        if(step==='publish' && published) btn.classList.add('done');
      });
    }
    function renderSidebar(){
      const q=($('#batchSearch')?.value || '').toLowerCase();
      $('#batchList').innerHTML=state.batches.filter(b=>b.title.toLowerCase().includes(q)).map(b=>{
        const s=batchStatus(b); const pub=b.articles.filter(a=>a.published).length;
        return `<div class="batch-card ${b.id===state.selectedId?'active':''}" data-id="${b.id}" role="button" tabindex="0">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div class="min-w-0 flex-fill">
              <div class="d-flex align-items-start gap-2">

    function selectBatch(id){ state.selectedId=id; const b=currentBatch(); state.selectedSourceId=b.sources[0]?.id; state.selectedArticleId=b.articles[0]?.id; state.activeStep=b.articles.length?'edit':'upload'; persist(); renderAll(); }

    }
    function switchStep(step){ state.activeStep=step; persist(); renderAll(); }

    function sourceContentHtml(content){
      const value = content || '';
      return /<\/?[a-z][\s\S]*>/i.test(value) ? value : esc(value).replace(/\n/g,'<br>');
    }
    function sourcePreviewEditor(src){

    }

              <div class="card-header d-flex justify-content-between align-items-center"><h2 class="h6 mb-0">1. Upload source material</h2><button id="generateFromUploadBtn" class="btn btn-sm york-btn" ${b.sources.length?'':'disabled'}>Generate articles</button></div>
              <div class="card-body">

    function bindUpload(b){
      $('#generateFromUploadBtn')?.addEventListener('click',()=>generateArticles(b));
      const openSource = id => { state.selectedSourceId=id; renderAll(); };
      $$('#uploadView .source-row').forEach(el=>{
        el.addEventListener('click',e=>{ if(e.target.closest('.remove-source-list')) return; openSource(el.dataset.sourceId); });
        el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openSource(el.dataset.sourceId); } });
      });
      $$('#uploadView .preview-source').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation(); openSource(el.dataset.sourceId);}));
      $$('#uploadView .remove-source-list').forEach(el=>el.addEventListener('click',e=>{ e.stopPropagation(); b.sources=b.sources.filter(s=>s.id!==el.dataset.sourceId); if(state.selectedSourceId===el.dataset.sourceId){state.selectedSourceId=b.sources[0]?.id;} markDirty(); renderAll(); }));
      $$('#uploadView .source-rich-cmd').forEach(btn=>btn.addEventListener('click',()=>{
        const editor=$('#sourcePreviewEditor');
        const cmd=btn.dataset.cmd;
        editor?.focus();
        if(cmd==='createLink'){
          const url=prompt('Enter link URL');
          if(url) document.execCommand(cmd,false,url);
        } else {
          document.execCommand(cmd,false,null);
        }
        const src=editor ? b.sources.find(s=>s.id===editor.dataset.sourceId) : null;
        if(src){ src.content=editor.innerHTML; markDirty(); }
      }));
      $('#sourcePreviewEditor')?.addEventListener('input',e=>{ const src=b.sources.find(s=>s.id===e.currentTarget.dataset.sourceId); if(src){ src.content=e.currentTarget.innerHTML; markDirty(); } });
      $('#addPasteBtn')?.addEventListener('click',()=>{ const txt=$('#pasteText').value.trim(); if(!txt){toast('Paste text before adding it.'); return;} const s={id:uid('src'), name:'Pasted source note', type:'Pasted text', content:txt}; b.sources.push(s); state.selectedSourceId=s.id; markDirty(); renderAll(); toast('Pasted text added.'); });
      $('#fileInput')?.addEventListener('change',e=>addFiles([...e.target.files], b));
      const dz=$('#dropZone');
      ['dragenter','dragover'].forEach(ev=>dz?.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
      ['dragleave','drop'].forEach(ev=>dz?.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
      dz?.addEventListener('drop',e=>addFiles([...e.dataTransfer.files], b));
      dz?.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();$('#fileInput').click();} });
      dz?.addEventListener('click',()=>$('#fileInput').click());
    }
    function addFiles(files,b){
      files.forEach(file=>{
        const ext=(file.name.split('.').pop()||'').toLowerCase();
        const type=ext==='txt'?'TXT':ext==='docx'?'DOCX placeholder':ext==='doc'?'DOC placeholder':'File';
        const s={id:uid('src'), name:file.name, type, content:type==='TXT'?'Reading file...':`Placeholder preview: ${file.name} was added. Word extraction is not implemented in this prototype.`};
        b.sources.push(s); state.selectedSourceId=s.id;
        if(type==='TXT'){
          const reader=new FileReader();
          reader.onload=()=>{s.content=reader.result || ''; markDirty(); renderAll();};
          reader.onerror=()=>{s.content='TXT preview could not be read.'; markDirty(); renderAll();};
          reader.readAsText(file);
        }
      });
      markDirty(); renderAll(); toast(`${files.length} file${files.length===1?'':'s'} added.`);
    }

    function generateArticles(b){

        articleTemplate({title:'Troubleshoot sign-in errors',description:'<p>Use this article when a user cannot sign in or receives an account-related error.</p>',resolution:'<ul><li>Confirm the username is correct.</li><li>Try a private browser window.</li><li>Reset the password if needed.</li><li>Escalate if the account appears locked or inactive.</li></ul>',tags:['Sign in','Troubleshooting'],relatedArticles:['Access the service for the first time'],faqLists:[firstFaq],allowedCustomers:['YU ALL'],confidence:81}),

              <div class="card-body d-grid gap-2">

    function richEditor(label,id,placeholder,value,help,locked=false){

    function bindEdit(b,a){

      $('#editArticleBtn')?.addEventListener('click',()=>{ unlockArticle(a,b); });
      $('#deleteArticleBtn')?.addEventListener('click',()=>deleteArticle(a,b));
      $('#attachmentDrop')?.addEventListener('click',()=>{ if(a.status!=='ready' && !a.published) $('#attachmentInput').click(); });
      $('#attachmentDrop')?.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();$('#attachmentInput').click();} });
      $('#attachmentInput')?.addEventListener('change',e=>{ a.attachments.push(...[...e.target.files].map(f=>f.name)); saveArticleFromForm(a,b,false); renderAll(); });
      bindChipInput('tagInput',a.tags,a,b);
      bindChipInput('relatedInput',a.relatedArticles,a,b);
      bindChipInput('faqInput',a.faqLists,a,b);
      bindChipInput('allowedInput',a.allowedCustomers,a,b);
      $$('.chip-remove').forEach(btn=>btn.addEventListener('click',()=>{
        const map={tag:a.tags, related:a.relatedArticles, faq:a.faqLists, allowed:a.allowedCustomers};
        map[btn.dataset.type].splice(Number(btn.dataset.index),1); saveArticleFromForm(a,b,false); renderAll();
      }));
    }
    function bindChipInput(id,arr,a,b){
      $('#'+id)?.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); const val=e.target.value.trim(); if(val && !arr.includes(val)) arr.push(val); e.target.value=''; saveArticleFromForm(a,b,false); renderAll(); } });
    }
    function saveArticleFromForm(a,b,rerender=false){
      if(!a) return;
      const title=$('#articleTitle')?.value?.trim();
      if(title!==undefined) a.title=title || 'Untitled article';
      a.articleType=$('#articleType')?.value || a.articleType;
      a.editor=$('#editorType')?.value || 'Rich';
      a.description=$('#descriptionBox')?.innerHTML || a.description;
      a.resolution=$('#resolutionBox')?.innerHTML || a.resolution;
      a.internalMemo=$('#memoBox')?.innerHTML || a.internalMemo;
      a.teams=$('#teamsInput')?.value || a.teams;
      a.active=$('#activeInput')?.checked ?? a.active;
      a.nextReview=$('#reviewDate')?.value || a.nextReview;
      if(a.published) a.status='published';
      markDirty(); if(rerender) renderAll();
    }
    function deleteArticle(a,b){
      if(!a) return;
      b.articles=b.articles.filter(x=>x.id!==a.id);
      state.selectedArticleId=b.articles[0]?.id;
      markDirty(); renderAll(); toast('Article deleted.');
    }
    function markArticleReady(a,b){
      if(!a.title?.trim()) a.title='Untitled article';
      a.published=false;
      a.status='ready';
      markDirty(); renderAll(); toast('Article locked and marked ready to publish.');
    }
    function unlockArticle(a,b){
      a.published=false;
      a.status='draft';
      markDirty(); renderAll(); toast('Article unlocked for editing.');
    }
    function publishArticle(a,b){
      if(!a.title?.trim()) a.title='Untitled article';
      a.published=true; a.status='published';
      markDirty(); renderAll(); toast('Article published in prototype.');
    }

    function openDeleteBatchModal(batchId=state.selectedId){
      state.pendingDeleteBatchId = batchId;
      const b = state.batches.find(x=>x.id===batchId) || currentBatch();
      $('#deleteBatchTitle').textContent = b ? `Delete “${b.title}”?` : 'Delete this batch?';
      const modal = bootstrap.Modal.getOrCreateInstance($('#deleteBatchModal'));
      modal.show();
    }

    function deleteCurrentBatch(){
      const targetId = state.pendingDeleteBatchId || state.selectedId;
      const b=state.batches.find(x=>x.id===targetId);
      if(!b) return;
      state.batches=state.batches.filter(x=>x.id!==b.id);
      if(!state.batches.length){
        state.batches.push({id:uid('b'),title:'Untitled article batch',created:nowLabel(),updated:nowLabel(),sources:[],articles:[]});
      }
      if(state.selectedId===b.id || !state.batches.find(x=>x.id===state.selectedId)){
        state.selectedId=state.batches[0].id;
        const next=currentBatch();
        state.selectedSourceId=next.sources[0]?.id || null;
        state.selectedArticleId=next.articles[0]?.id || null;
        state.activeStep=next.articles.length?'edit':'upload';
      }
      state.pendingDeleteBatchId=null;
      markDirty();
      renderAll();
      toast('Batch deleted. Published Halo KB articles are not affected in this prototype.');
    }

    function renderPublish(b){
      const ready=b.articles.filter(a=>!a.published && a.status==='ready');
      const draft=b.articles.filter(a=>!a.published && a.status!=='ready');
      const published=b.articles.filter(a=>a.published);
      $('#publishView').innerHTML=`
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center"><h2 class="h6 mb-0">4. Publish articles</h2><div class="d-flex gap-2"><button id="publishSelectedBtn" class="btn btn-sm york-btn" ${ready.length?'':'disabled'}>Publish selected</button><button id="publishAllBtn" class="btn btn-sm btn-outline-york" ${ready.length?'':'disabled'}>Publish all ready</button></div></div>
          <div class="card-body">
            <div class="row g-3 mb-3">
              <div class="col-md-3"><div class="p-3 rounded border bg-light"><div class="small-label">Draft</div><div class="h3 mb-0">${draft.length}</div></div></div>
              <div class="col-md-3"><div class="p-3 rounded border bg-light"><div class="small-label">Ready</div><div class="h3 mb-0">${ready.length}</div></div></div>
              <div class="col-md-3"><div class="p-3 rounded border bg-light"><div class="small-label">Published</div><div class="h3 mb-0">${published.length}</div></div></div>
              <div class="col-md-3"><div class="p-3 rounded border bg-light"><div class="small-label">Total articles</div><div class="h3 mb-0">${b.articles.length}</div></div></div>
            </div>
            <div class="list-group">
              ${b.articles.map(a=>`<label class="list-group-item d-flex justify-content-between align-items-center gap-3"><span class="d-flex align-items-center gap-3"><input class="form-check-input pub-select" type="checkbox" data-id="${a.id}" ${a.selected?'checked':''} ${a.status==='ready' && !a.published?'':'disabled'}><span><span class="fw-semibold d-block">${esc(a.title || 'Untitled article')}</span><span class="small text-muted">${esc(a.faqLists?.join(', ') || 'No FAQ List')} · ${esc(a.allowedCustomers?.join(', ') || 'No allowed customers')}</span></span></span>${articleBadge(a)}</label>`).join('') || '<div class="text-center text-muted p-4 border rounded bg-light">No articles generated yet.</div>'}
            </div>
          </div>
        </div>`;
      $$('.pub-select').forEach(cb=>cb.addEventListener('change',()=>{ const art=b.articles.find(a=>a.id===cb.dataset.id); if(art) art.selected=cb.checked; markDirty(); }));
      $('#publishSelectedBtn')?.addEventListener('click',()=>{ let count=0; b.articles.filter(a=>a.selected && a.status==='ready' && !a.published).forEach(a=>{a.published=true; a.status='published'; count++;}); markDirty(); renderAll(); toast(`${count} article${count===1?'':'s'} published.`); });
      $('#publishAllBtn')?.addEventListener('click',()=>{ ready.forEach(a=>{a.published=true; a.status='published';}); markDirty(); renderAll(); toast(`${ready.length} article${ready.length===1?'':'s'} published.`); });
    }

    $('#batchTitle').addEventListener('input',e=>{ const b=currentBatch(); b.title=e.target.value || 'Untitled batch'; markDirty(); renderSidebar(); });
    $('#batchSearch').addEventListener('input',renderSidebar);
    $('#newBatchBtn').addEventListener('click',()=>{
      const b={id:uid('b'),title:'Untitled article batch',created:nowLabel(),updated:nowLabel(),sources:[],articles:[]};
      state.batches.unshift(b); state.selectedId=b.id; state.selectedSourceId=null; state.selectedArticleId=null; state.activeStep='upload'; markDirty(); renderAll();
    });
    $('#confirmDeleteBatchBtn').addEventListener('click',()=>{
      bootstrap.Modal.getOrCreateInstance($('#deleteBatchModal')).hide();
      deleteCurrentBatch();
    });
    $$('.flow-step').forEach(btn=>btn.addEventListener('click',()=>switchStep(btn.dataset.step)));

    renderAll();
  </script>
</body>
</html>
